<div class="h-full flex flex-col" style="font-family: 'Space Grotesk', system-ui, sans-serif;">
  <!-- Back button -->
  <div class="back-to-projects-wrap">
    <button
      class="back-btn flex items-center gap-2 w-full px-2 py-1.5 rounded-md text-sm font-semibold cursor-pointer transition-colors"
      style="background: transparent; border: none; color: var(--rc-muted); font-family: inherit;"
      (click)="backToProjects()">
      <i class="pi pi-arrow-left" style="font-size: 0.7rem;"></i>
      <span>{{ 'MISSION.BACK_TO_PROJECTS' | translate }}</span>
    </button>
  </div>

  <p-contextMenu #missionMenu [model]="contextMenuItems"></p-contextMenu>
  <p-confirmDialog></p-confirmDialog>

  <!-- Rename dialog -->
  <p-dialog
    [header]="'MISSION.RENAME_DIALOG_TITLE' | translate"
    [(visible)]="renameDialogVisible"
    [modal]="true"
    [closable]="false"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '28rem' }"
  >
    <div class="flex flex-col gap-3">
      <label for="renameInput" class="text-sm" style="color: var(--rc-muted);">{{ 'MISSION.RENAME_NEW_NAME_LABEL' | translate }}</label>
      <input
        id="renameInput"
        class="mission-input"
        [(ngModel)]="renameName"
        [placeholder]="'MISSION.RENAME_PLACEHOLDER' | translate" />
    </div>
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-2 w-full">
        <button class="cancel-btn" (click)="renameMissionCancel()" [disabled]="renameSubmitting">{{ 'COMMON.CANCEL' | translate }}</button>
        <button class="save-btn" (click)="renameMissionConfirm()" [disabled]="renameSubmitting">{{ 'COMMON.SAVE' | translate }}</button>
      </div>
    </ng-template>
  </p-dialog>

  <!-- Mission list -->
  <div class="flex-1 min-h-0 overflow-y-auto overflow-x-hidden select-none" style="scrollbar-width: thin; scrollbar-color: var(--rc-border) transparent;" (pointerdown)="clearSelection()">
    @if (missionsLoading) {
      <div class="p-3 flex flex-col gap-2">
        @for (i of [1, 2, 3, 4, 5]; track i) {
          <div class="flex items-center gap-2 px-2 py-1.5">
            <div class="w-5 h-5 rounded-full animate-pulse" style="background: var(--rc-elevated);"></div>
            <div class="h-3 rounded animate-pulse" style="width: 70%; background: var(--rc-elevated);"></div>
          </div>
        }
      </div>
    } @else {
      <!-- Fixed Top (setups) -->
      <p-timeline [value]="topMissions" layout="vertical" class="px-3 pt-2">
        <ng-template let-item pTemplate="content">
          <div
            class="mission-row flex items-center gap-2 cursor-pointer px-2 py-1"
            [class.active-mission]="currentMission?.name === item.name"
            (click)="getDetailedMission(item.name)">
            <span class="mission-order">{{ item.order }}</span>
            <span class="mission-name">{{ item.name }}</span>
            <i class="pi pi-lock mission-icon ml-auto"></i>
          </div>
        </ng-template>
      </p-timeline>

      <!-- Reorderable Middle -->
      <p-timeline
        cdkDropList
        [cdkDropListData]="middleMissions"
        (cdkDropListDropped)="dropMiddle($event)"
        [value]="middleMissions"
        layout="vertical"
        class="px-3">
        <ng-template let-item pTemplate="content">
          <div
            cdkDrag
            class="mission-row flex items-center gap-2 cursor-pointer px-2 py-1"
            [class.active-mission]="currentMission?.name === item.name"
            (click)="getDetailedMission(item.name)"
            (contextmenu)="onRightClickMission($event, item)"
            (cdkDragStarted)="clearSelection()">
            <span class="mission-order">{{ item.order }}</span>
            <span class="mission-name">{{ item.name }}</span>
            <i class="pi pi-bars mission-icon ml-auto"></i>
          </div>
        </ng-template>
      </p-timeline>

      <!-- Fixed Bottom (shutdown) -->
      <p-timeline [value]="bottomMissions" layout="vertical" class="px-3 pb-2">
        <ng-template let-item pTemplate="content">
          <div
            class="mission-row flex items-center gap-2 cursor-pointer px-2 py-1"
            [class.active-mission]="currentMission?.name === item.name"
            (click)="getDetailedMission(item.name)">
            <span class="mission-order">{{ item.order }}</span>
            <span class="mission-name">{{ item.name }}</span>
            <i class="pi pi-lock mission-icon ml-auto"></i>
          </div>
        </ng-template>
      </p-timeline>
    }
  </div>

  <!-- Add Mission -->
  <div class="add-mission-wrap">
    @if (!addingMission) {
      <div class="add-mission-card" (click)="enableAddMission()">
        <button class="add-mission-btn">
          <i class="pi pi-plus"></i>
          {{ 'MISSION.ADD_MISSION' | translate }}
        </button>
      </div>
    } @else {
      <div class="add-mission-form" style="background: var(--rc-surface); border: 1px solid var(--rc-border); border-radius: 8px;">
        <input
          class="mission-input"
          [(ngModel)]="newMissionName"
          [placeholder]="'MISSION.NEW_MISSION_PLACEHOLDER' | translate" />
        <div class="form-actions">
          <button class="cancel-btn" (click)="cancelAddMission()">{{ 'COMMON.CANCEL' | translate }}</button>
          <button class="save-btn" (click)="createMission()">{{ 'COMMON.SAVE' | translate }}</button>
        </div>
      </div>
    }
  </div>
</div>
