<div class="viz-panel" [class.no-header]="!showHeader()" [class.embedded]="embedded()">
  @if (showHeader()) {
    <div class="viz-header panel-drag-handle">
      <div class="viz-title">
        <i class="pi pi-map"></i>
        <span>{{ 'FLOWCHART.VIEW_TOGGLE_TABLE_VIZ' | translate }}</span>
      </div>
      <div class="viz-status">
        @if (mapService.isLoading()) {
          <i class="pi pi-spin pi-spinner viz-loading-spinner"></i>
        } @else if (mapService.isLoaded()) {
          <span class="viz-pill viz-pill-ready">{{ 'FLOWCHART.TABLE_MAP_LOADED_STATUS' | translate }}</span>
        }
        <button
          class="edit-path-btn"
          (click)="openPlanningOverlay(); $event.stopPropagation()"
          [title]="'FLOWCHART.PLANNING_MODE' | translate">
          <i class="pi pi-map-marker"></i>
          <span>{{ 'FLOWCHART.EDIT_PATH' | translate }}</span>
        </button>
      </div>
    </div>
  }
  <div class="viz-body">
    <canvas
      #canvas
      class="viz-canvas"
      [class.viz-canvas-editable]="allowStartPoseEdit()"
      [class.viz-canvas-loading]="mapService.isLoading() || vizService.plannedPathLoading()"
      (wheel)="onWheel($event)"
      (pointerdown)="onCanvasPointerDown($event)"
      (pointermove)="onCanvasPointerMove($event)"
      (pointerup)="onCanvasPointerUp($event)"
      (dblclick)="onDoubleClick()"
      (contextmenu)="$event.preventDefault()"></canvas>

    @if (mapService.isLoading() || vizService.plannedPathLoading()) {
      <div class="viz-loading-overlay">
        <i class="pi pi-spin pi-spinner viz-overlay-spinner"></i>
      </div>
    }
  </div>
</div>
