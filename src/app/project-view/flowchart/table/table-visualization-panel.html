<div class="viz-panel" [class.no-header]="!showHeader()" [class.embedded]="embedded()">
  @if (showHeader()) {
    <div class="viz-header panel-drag-handle">
      <div class="viz-title">
        <i class="pi pi-map"></i>
        <span>{{ 'FLOWCHART.VIEW_TOGGLE_TABLE_VIZ' | translate }}</span>
      </div>
      <div class="viz-status">
        @if (mapService.isLoaded()) {
          <span class="viz-pill viz-pill-ready">Map Loaded</span>
        }
      </div>
    </div>
  }
  <div class="viz-body">
    <canvas
      #canvas
      class="viz-canvas"
      [class.viz-canvas-editable]="allowStartPoseEdit()"
      (pointerdown)="onCanvasPointerDown($event)"></canvas>
  </div>
</div>
