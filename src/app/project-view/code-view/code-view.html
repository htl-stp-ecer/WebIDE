<div class="code-view-root">
  <div class="editor-area">
    <!-- Editor toolbar -->
    <div class="editor-toolbar">
      <span class="file-path">
        @if (missionName()) {
          {{ missionName() }}
          @if (isDirty()) { <span class="dirty-dot" title="Unsaved changes">●</span> }
        } @else {
          <span class="no-file">No mission selected</span>
        }
      </span>
      @if (missionName()) {
        <button
          type="button"
          class="save-btn"
          [disabled]="!isDirty() || isSaving()"
          (click)="saveFile()"
          title="Save (Ctrl+S)">
          @if (isSaving()) {
            <i class="pi pi-spin pi-spinner"></i>
          } @else {
            <i class="pi pi-save"></i>
          }
          Save
        </button>
      }
    </div>

    <!-- Loading / error states -->
    @if (isLoading()) {
      <div class="editor-placeholder">
        <i class="pi pi-spin pi-spinner"></i>
      </div>
    } @else if (loadError()) {
      <div class="editor-placeholder error">{{ loadError() }}</div>
    } @else if (!missionName()) {
      <div class="editor-placeholder">Select a mission to view its code</div>
    } @else {
      <div class="editor-wrapper">
        <app-code-editor
          [content]="sourceCode()"
          (contentChange)="onContentChange($event)">
        </app-code-editor>
      </div>
    }
  </div>
</div>
